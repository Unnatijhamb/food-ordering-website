<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | Eatzo</title>
    <link rel="stylesheet" href="../style.css">
    

</head>

<body class="profile-body">

<div class="profile-topbar">
    <a href="../index.html" class="back-btn">←</a>
    <span>Profile</span>
</div>

<div class="profile-container">

    <div class="profile-user-card">
        <div class="profile-avatar">U</div>
        <div>
            <h2 id="profileName">user</h2>
            <p class="edit-profile">
    <a href="../login.html" style="text-decoration:none; color:#e23744;">
        Edit profile ›
    </a>
</p>
        </div>
    </div>

    <div class="profile-gold-card">
        👑 Join Eatzo Gold <span>›</span>
    </div>

    <div class="profile-section">
        <a href="wallet.html" class="profile-item">
    <span>Eatzo Wallet</span>
    <span>›</span>
</a>
        <div class="profile-item">Your Coupons <span>›</span></div>
        <div class="profile-item">Gift Cards <span>›</span></div>
        <div class="profile-item" onclick="goToOrders()">Previous Orders <span>›</span></div>
    </div>

    <div class="profile-section">
        <div class="profile-item">Feedback <span>›</span></div>
        <a href="account.html" class="profile-item">
        Account Settings <span>›</span>
    </a>
        <div class="profile-item">Privacy & Security <span>›</span></div>
    </div>

   <div class="profile-section">
        <div class="profile-item logout" onclick="logout()">Log Out</div>
    </div>


</div>
<script>
    const user = JSON.parse(localStorage.getItem("userData"));

if(user){
    document.getElementById("profileName").innerText =
        user.firstName + " " + user.lastName;

    document.querySelector(".profile-avatar").innerText =
        user.firstName.charAt(0).toUpperCase();
}

    if (username) {
        document.getElementById("profileName").innerText = username;
        document.querySelector(".profile-avatar").innerText = username.charAt(0).toUpperCase();
    }
    function logout() {
    localStorage.removeItem("userData");   // 🔥 only this needed
    localStorage.removeItem("eatzoLoggedIn");
    localStorage.removeItem("eatzoUserName");

    window.location.href = "../index.html";
}
    function goToOrders(){
    window.location.href = "orders.html";
}

</script>


</body>
</html>
